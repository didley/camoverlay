  <!-- Row 0 (y=2): 6 wide -->
  <rect x="5" y="2" width="6" height="1" fill="#cc0000"/>
  <!-- Row 1 (y=3): 10 wide -->
  <rect x="3" y="3" width="10" height="1" fill="#cc0000"/>
  <!-- Row 2 (y=4): 12 wide -->
  <rect x="2" y="4" width="12" height="1" fill="#cc0000"/>
